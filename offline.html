<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sin conexión — Logística López Ortiz</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#1e293b;border:1px solid #334155;border-radius:1rem;padding:2.5rem;max-width:400px;width:100%;text-align:center}
    .icon{width:64px;height:64px;background:rgba(239,68,68,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:.75rem}
    p{color:#94a3b8;font-size:.9rem;line-height:1.6;margin-bottom:1.5rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;background:#4f6ef7;color:#fff;padding:.65rem 1.5rem;border-radius:.5rem;font-weight:600;font-size:.9rem;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:.85}
    .status{margin-top:1.25rem;font-size:.78rem;color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>No podemos conectarnos al servidor en este momento. Verifica tu conexión a internet e intenta de nuevo.</p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Reintentar
    </button>
    <p class="status" id="status-text">Verificando conexión...</p>
  </div>
  <script>
    function checkOnline() {
      const el = document.getElementById('status-text');
      if (navigator.onLine) {
        el.textContent = '✅ Conexión restaurada — recargando...';
        el.style.color = '#34d399';
        setTimeout(() => window.location.href = '/', 1000);
      } else {
        el.textContent = '❌ Sin conexión. Esperando...';
      }
    }
    window.addEventListener('online', checkOnline);
    checkOnline();
  </script>
</body>
</html>
